<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بطاقات تهنئة العيد - عمار سنان</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap');

body {
    margin: 0;
    background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
    font-family: 'Cairo', sans-serif;
    color: #fff;
    text-align: center;
    overflow-x: hidden;
}

/* حزام التهنئة المتحرك */
.ticker {
    background: linear-gradient(90deg, #ffd700, #ff8c00);
    color: #000;
    padding: 12px 0;
    font-size: 24px;
    font-weight: bold;
    white-space: nowrap;
    overflow: hidden;
    box-shadow: 0 0 20px gold;
    position: relative;
    z-index: 10;
}
.ticker span {
    display: inline-block;
    padding-left: 100%;
    animation: marquee 15s linear infinite;
}
@keyframes marquee {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}

/* خلفية الألعاب النارية */
#fireworks-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
}

h1 {
    margin-top: 30px;
    font-size: 48px;
    background: linear-gradient(90deg, #ffd700, #ff8c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    position: relative;
    z-index: 2;
}

.container {
    margin: 30px auto;
    max-width: 900px;
    position: relative;
    z-index: 5;
}

input, button { padding: 12px 20px; border: none; border-radius: 12px; font-size: 18px; margin: 10px; font-family: 'Cairo', sans-serif; }
input[type="text"] { width: 320px; background: rgba(255,255,255,0.1); color: #fff; border: 2px solid gold; }
button { background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
button:hover { transform: scale(1.1); box-shadow: 0 0 20px gold; }
.audio-btn { background: linear-gradient(90deg, #8e2de2, #4a00e0); color: #fff; }

.card {
    position: relative;
    margin: 30px auto;
    width: 600px;
    height: 350px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(255,215,0,0.5);
    display: none;
    background: #000;
}
.card img { width: 100%; height: 100%; object-fit: cover; }
.card-text {
    position: absolute;
    bottom: 40px;
    width: 100%;
    font-size: 28px;
    color: #fff;
    text-shadow: 2px 2px 10px #000;
}
</style>
</head>
<body>

<canvas id="fireworks-canvas"></canvas>

<div class="ticker">
    <span>✨ بمناسبة عيد الأضحى المبارك يهنئكم عمار سنان ✨ كل عام وأنتم بخير ✨ أضحى مبارك ✨</span>
</div>

<h1>صانع تهنئة العيد</h1>

<div class="container">
    <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 20px;">
        <button class="audio-btn" onclick="playAudio('audio1')">🔊 لبيك اللهم لبيك</button>
        <button class="audio-btn" onclick="playAudio('audio2')">🔊 من العايدين</button>
        <audio id="audio1" src="audio1.mp3"></audio>
        <audio id="audio2" src="audio2.mp3"></audio>
    </div>

    <input type="text" id="name" placeholder="اكتب اسمك هنا">
    <br>
    <div>
        <button onclick="setImage('1.jpg')">صورة 1</button>
        <button onclick="setImage('2.jpg')">صورة 2</button>
        <button onclick="setImage('3.jpg')">صورة 3</button>
        <input type="hidden" id="imgUrl">
    </div>

    <button onclick="generateCard()">✨ اصنع بطاقتي ✨</button>
    <button onclick="downloadImage()">💾 تحميل الصورة</button>

    <div class="card" id="card">
        <img id="cardImg" src="">
        <div class="card-text" id="cardText"></div>
    </div>
</div>

<script>
const messages = ["عيدك مبارك يا {name}", "تقبل الله طاعتك يا {name}", "{name}، كل عام وأنت بخير"];

function setImage(name) { document.getElementById("imgUrl").value = name; }
function playAudio(id) { 
    document.querySelectorAll('audio').forEach(a => {a.pause(); a.currentTime=0;});
    document.getElementById(id).play(); 
}

function generateCard() {
    const nameInput = document.getElementById("name").value;
    const name = nameInput ? nameInput : "صديقنا";
    const img = document.getElementById("imgUrl").value;
    if(!img) return alert("الرجاء اختيار صورة أولاً");
    
    document.getElementById("cardImg").src = img;
    document.getElementById("cardText").innerText = messages[Math.floor(Math.random()*messages.length)].replace("{name}", name);
    document.getElementById("card").style.display = "block";
}

function downloadImage() {
    html2canvas(document.getElementById("card")).then(canvas => {
        let a = document.createElement('a');
        a.download = 'eid-card.png';
        a.href = canvas.toDataURL();
        a.click();
    });
}

// نظام الألعاب النارية
const canvas = document.getElementById('fireworks-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        this.velocity = { x: (Math.random() - 0.5) * 8, y: (Math.random() - 0.5) * 8 };
        this.alpha = 1;
    }
    draw() {
        ctx.save(); ctx.globalAlpha = this.alpha; ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
    }
    update() { this.x += this.velocity.x; this.y += this.velocity.y; this.alpha -= 0.01; }
}

function createFirework() {
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height / 2;
    const color = `hsl(${Math.random() * 360}, 50%, 50%)`;
    for (let i = 0; i < 30; i++) particles.push(new Particle(x, y, color));
}

function animate() {
    ctx.fillStyle = 'rgba(15, 15, 26, 0.2)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
        if (p.alpha <= 0) particles.splice(i, 1);
        else { p.update(); p.draw(); }
    });
    if (Math.random() < 0.05) createFirework();
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
